name: Deploy Examples to GitHub Pages

on:
  # Trigger only on manual dispatch.
  # Automatic push-based deployment is disabled for this fork because
  # GitHub Pages is not configured here.  Enable the push trigger below
  # and configure Pages in repo Settings if you want automatic deployment.
  workflow_dispatch:

  # Uncomment to re-enable automatic deployment:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'assets/examples/md/**'
  #     - 'assets/themes/**'
  #     - 'src/themes/**'
  #     - 'src/styles/**'
  #     - '.github/workflows/deploy-examples.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      - name: Generate markdown examples
        run: pnpm run examples:generate

      - name: Generate HTML from markdown
        run: pnpm run examples:html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'assets/examples/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
