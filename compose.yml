services:
  marp-mcp:
    image: ghcr.io/whitehara/marp-mcp:latest
    ports:
      - "3000:3000"
    environment:
      - MCP_TRANSPORT=http
      - PORT=3000
      # MCP_SERVER_ID must match the Server ID registered in Cloudflare AI Controls.
      # Default: marp-mcp
      #- MCP_SERVER_ID=marp-mcp
